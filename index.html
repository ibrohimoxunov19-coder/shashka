<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Game Portal: Chess, Checkers & X-O</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --white-cell: #f8fafc; --black-cell: #64748b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        
        /* Menu */
        #main-menu { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .menu-btn { width: 280px; padding: 20px; font-size: 1.4rem; cursor: pointer; border: none; border-radius: 15px; background: var(--card); color: white; transition: 0.3s; border: 1px solid #334155; }
        .menu-btn:hover { background: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        /* Game View */
        #game-view { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .back-btn { background: #ef4444; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        #status { margin-bottom: 20px; font-size: 1.3rem; padding: 10px 30px; background: var(--card); border-radius: 50px; border: 1px solid #334155; }

        /* Board Styles */
        #board { display: grid; border: 5px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .cell { display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        
        /* X-O Specific */
        .xo-cell { width: 100px; height: 100px; font-size: 3rem; background: var(--card); border: 2px solid #334155; }
        .xo-cell:hover { background: #334155; }
        
        /* Chess/Checkers Specific */
        .grid-8 { grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); }
        .c-cell { width: 60px; height: 60px; font-size: 40px; }
        .white { background: var(--white-cell); }
        .black { background: var(--black-cell); }
        .selected { background: #fbbf24 !important; }
        
        .piece-shashka { width: 80%; height: 80%; border-radius: 50%; border: 2px solid #333; }
        .king::after { content: '⭐'; font-size: 20px; color: gold; display: flex; justify-content: center; align-items: center; height: 100%; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="font-size: 2.5rem; margin-bottom: 30px;">O'yinlar Portali</h1>
        <button class="menu-btn" onclick="initGame('chess')">♟️ Shaxmat AI</button>
        <button class="menu-btn" onclick="initGame('checkers')">🔴 Shashka AI</button>
        <button class="menu-btn" onclick="initGame('xo')">❌ Tic-Tac-Toe AI</button>
    </div>

    <div id="game-view">
        <button class="back-btn" onclick="location.reload()">⬅ ASOSIY MENYU</button>
        <div id="status">Sizning navbatingiz</div>
        <div id="board"></div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const menu = document.getElementById('main-menu');
        const gameView = document.getElementById('game-view');

        let board = [];
        let turn = 1; // 1: Player, 2: AI
        let currentMode = '';
        let selected = null;

        const pieceValues = { 'p': 10, 'n': 30, 'b': 30, 'r': 50, 'q': 90, 'k': 900, 's': 10 };
        const chessChars = { 1: {p:'♙',r:'♖',n:'♘',b:'♗',q:'♕',k:'♔'}, 2: {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚'} };

        function initGame(mode) {
            currentMode = mode;
            menu.style.display = 'none';
            gameView.style.display = 'flex';
            boardEl.className = '';
            
            if (mode === 'xo') {
                board = Array(9).fill(null);
                boardEl.style.gridTemplateColumns = 'repeat(3, 100px)';
                boardEl.style.gridTemplateRows = 'repeat(3, 100px)';
            } else {
                board = Array(8).fill(null).map(() => Array(8).fill(null));
                boardEl.classList.add('grid-8');
                if (mode === 'chess') setupChess();
                else setupCheckers();
            }
            render();
        }

        function setupChess() {
            const layout = ['r','n','b','q','k','b','n','r'];
            for(let i=0; i<8; i++) {
                board[0][i] = { type: layout[i], p: 2 }; board[1][i] = { type: 'p', p: 2 };
                board[6][i] = { type: 'p', p: 1 }; board[7][i] = { type: layout[i], p: 1 };
            }
        }

        function setupCheckers() {
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if((r+c)%2!==0) {
                    if(r<3) board[r][c] = { type: 's', p: 2, k: false };
                    if(r>4) board[r][c] = { type: 's', p: 1, k: false };
                }
            }
        }

        function render() {
            boardEl.innerHTML = '';
            if (currentMode === 'xo') {
                board.forEach((val, i) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell xo-cell';
                    cell.innerText = val || '';
                    cell.style.color = val === 'X' ? '#60a5fa' : '#f87171';
                    cell.onclick = () => handleXOClick(i);
                    boardEl.appendChild(cell);
                });
            } else {
                for (let r=0; r<8; r++) for (let c=0; c<8; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell c-cell ${(r+c)%2===0 ? 'white' : 'black'}`;
                    if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                    const p = board[r][c];
                    if (p) {
                        if (currentMode === 'chess') {
                            cell.innerText = chessChars[p.p][p.type];
                            cell.style.color = p.p === 1 ? '#000' : '#d63031';
                        } else {
                            const d = document.createElement('div');
                            d.className = `piece-shashka ${p.k ? 'king' : ''}`;
                            d.style.background = p.p === 1 ? '#fff' : '#ef4444';
                            cell.appendChild(d);
                        }
                    }
                    cell.onclick = () => handleGridClick(r, c);
                    boardEl.appendChild(cell);
                }
            }
        }

        // --- X-O LOGIC ---
        function handleXOClick(i) {
            if (board[i] || turn !== 1) return;
            board[i] = 'X';
            turn = 2;
            render();
            if (!checkXOWin()) setTimeout(aiXOMove, 500);
        }

        function aiXOMove() {
            const empty = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                // Oddiy AI: Bo'sh joylardan birini tanlaydi
                board[empty[Math.floor(Math.random() * empty.length)]] = 'O';
                turn = 1;
                render();
                checkXOWin();
            }
        }

        function checkXOWin() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let l of lines) {
                if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]) {
                    statusEl.innerText = board[l[0]] === 'X' ? "SIZ YUTDINGIZ! 🎉" : "BOT YUTDI! 🤖";
                    turn = 0; return true;
                }
            }
            if (!board.includes(null)) { statusEl.innerText = "DURANG! 🤝"; return true; }
            return false;
        }

        // --- CHESS/CHECKERS LOGIC ---
        function handleGridClick(r, c) {
            if (turn !== 1) return;
            const p = board[r][c];
            if (p && p.p === 1) { selected = {r, c}; render(); }
            else if (selected) {
                if (isValidMove(selected.r, selected.c, r, c)) {
                    executeMove(selected.r, selected.c, r, c);
                    selected = null;
                    turn = 2;
                    statusEl.innerText = "Bot o'ylamoqda...";
                    setTimeout(aiGridMove, 600);
                }
            }
        }

        function executeMove(fr, fc, tr, tc) {
            const p = board[fr][fc];
            if (currentMode === 'checkers' && Math.abs(tr-fr) === 2) board[(fr+tr)/2][(fc+tc)/2] = null;
            board[tr][tc] = p;
            board[fr][fc] = null;
            if ((tr === 0 || tr === 7) && p.type === 'p') p.type = 'q';
            if ((tr === 0 || tr === 7) && p.type === 's') p.k = true;
            render();
        }

        function isValidMove(fr, fc, tr, tc) {
            const p = board[fr][fc]; const target = board[tr][tc];
            if (target && target.p === p.p) return false;
            const dr = tr-fr, dc = tc-fc;
            if (currentMode === 'chess') {
                if (p.type === 'p') return dc === 0 && dr === (p.p === 1 ? -1 : 1) && !target;
                if (p.type === 'n') return (Math.abs(dr)===2 && Math.abs(dc)===1) || (Math.abs(dr)===1 && Math.abs(dc)===2);
                return true; // Soddalashtirilgan shaxmat mantiqi
            } else {
                if (Math.abs(dr) === 1 && Math.abs(dc) === 1 && !target) return p.k || (p.p===1?dr<0:dr>0);
                if (Math.abs(dr) === 2 && Math.abs(dc) === 2 && !target) return board[(fr+tr)/2][(fc+tc)/2]?.p === (p.p===1?2:1);
            }
            return false;
        }

        function aiGridMove() {
            let moves = [];
            for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
                if(board[r][c] && board[r][c].p === 2) {
                    for(let tr=0; tr<8; tr++) for(let tc=0; tc<8; tc++) {
                        if(isValidMove(r, c, tr, tc)) moves.push({fr:r, fc:c, tr, tc});
                    }
                }
            }
            if(moves.length > 0) {
                const m = moves[Math.floor(Math.random()*moves.length)];
                executeMove(m.fr, m.fc, m.tr, m.tc);
                turn = 1;
                statusEl.innerText = "Sizning navbatingiz";
            }
        }

    </script>
</body>
</html>
