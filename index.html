<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Hub - Win Edition</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #10b981; --white-cell: #f1f5f9; --black-cell: #475569; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        #main-menu { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .menu-btn { width: 320px; padding: 22px; font-size: 1.4rem; cursor: pointer; border: none; border-radius: 15px; background: var(--card); color: white; transition: 0.3s; border: 2px solid #334155; }
        .menu-btn:hover { background: var(--accent); transform: scale(1.05); }
        #game-view { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        #status { margin-bottom: 20px; font-size: 1.5rem; padding: 15px 40px; background: var(--card); border-radius: 50px; border: 3px solid #334155; color: #fbbf24; text-align: center; font-weight: bold; min-width: 350px; transition: 0.3s; }
        .must-hit { color: #ef4444 !important; border-color: #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #board { display: grid; border: 10px solid #1e293b; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .cell { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 45px; position: relative; }
        .white { background: var(--white-cell); }
        .black { background: var(--black-cell); }
        .selected { background: #fbbf24 !important; }
        .piece-shashka { width: 85%; height: 85%; border-radius: 50%; border: 3px solid rgba(0,0,0,0.2); transition: 0.2s; }
        .king::after { content: '⭐'; font-size: 24px; color: gold; filter: drop-shadow(0 0 2px black); }
        .grid-8 { grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); }
        .grid-3 { grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px); }
        .xo-cell { width: 100px; height: 100px; font-size: 70px; background: var(--card); border: 2px solid #334155; }
        .back-btn { background: #ef4444; color: white; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-menu">
    <h1 style="color: var(--accent); font-size: 2.5rem;">GAMER PRO HUB</h1>
    <button class="menu-btn" onclick="initGame('checkers')">🔴 Rossiya Shashkasi</button>
    <button class="menu-btn" onclick="initGame('chess')">♟️ Shaxmat AI</button>
    <button class="menu-btn" onclick="initGame('xo')">❌ Tic-Tac-Toe (X-O)</button>
</div>

<div id="game-view">
    <button class="back-btn" onclick="location.reload()">⬅ ASOSIY MENYU</button>
    <div id="status">O'yinni tanlang</div>
    <div id="board"></div>
</div>

<script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const menu = document.getElementById('main-menu');
    const gameView = document.getElementById('game-view');

    let board = [];
    let turn = 1; 
    let currentMode = '';
    let selected = null;
    let comboPiece = null;

    function initGame(mode) {
        currentMode = mode;
        menu.style.display = 'none';
        gameView.style.display = 'flex';
        turn = 1; selected = null; comboPiece = null;
        if (mode === 'xo') {
            board = Array(9).fill(null);
            boardEl.className = 'grid-3';
        } else {
            board = Array(8).fill(null).map(() => Array(8).fill(null));
            boardEl.className = 'grid-8';
            if (mode === 'checkers') setupCheckers(); else setupChess();
        }
        updateStatus("Sizning navbatingiz");
        render();
    }

    function setupCheckers() {
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) {
            if((r+c)%2!==0) {
                if(r<3) board[r][c] = { p: 2, k: false };
                if(r>4) board[r][c] = { p: 1, k: false };
            }
        }
    }

    function setupChess() {
        const layout = ['r','n','b','q','k','b','n','r'];
        for(let i=0; i<8; i++) {
            board[0][i] = { type: layout[i], p: 2 }; board[1][i] = { type: 'p', p: 2 };
            board[6][i] = { type: 'p', p: 1 }; board[7][i] = { type: layout[i], p: 1 };
        }
    }

    function updateStatus(text, isAlert = false) {
        statusEl.innerText = text;
        if(isAlert) statusEl.classList.add('must-hit');
        else statusEl.classList.remove('must-hit');
    }

    function render() {
        boardEl.innerHTML = '';
        board.forEach((row, r) => {
            if (currentMode === 'xo') {
                const cell = document.createElement('div');
                cell.className = 'cell xo-cell';
                cell.innerText = board[r] || '';
                cell.onclick = () => handleXOMove(r);
                boardEl.appendChild(cell);
                return;
            }
            row.forEach((p, c) => {
                const cell = document.createElement('div');
                cell.className = `cell ${(r+c)%2===0 ? 'white' : 'black'}`;
                if (p) {
                    if (currentMode === 'checkers') {
                        const d = document.createElement('div');
                        d.className = `piece-shashka ${p.k ? 'king' : ''}`;
                        d.style.background = p.p === 1 ? '#fff' : '#ef4444';
                        cell.appendChild(d);
                    } else {
                        const chars = { 1: {p:'♙',r:'♖',n:'♘',b:'♗',q:'♕',k:'♔'}, 2: {p:'♟',r:'♜',n:'♞',b:'♝',q:'♛',k:'♚'} };
                        cell.innerText = chars[p.p][p.type];
                        cell.style.color = p.p === 1 ? '#000' : '#ef4444';
                    }
                }
                if (selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                cell.onclick = () => handleMove(r, c);
                boardEl.appendChild(cell);
            });
        });
    }

    function handleMove(r, c) {
        if (turn !== 1) return;
        const p = board[r][c];

        if (p && p.p === 1) {
            if (comboPiece && (r !== comboPiece.r || c !== comboPiece.c)) {
                updateStatus("URISHINGIZ SHART!", true); return;
            }
            const allCaps = getAllCaptures(1);
            const thisPieceMoves = getLegalMoves(r, c);
            if (allCaps.length > 0 && !thisPieceMoves.some(m => m.cap)) {
                updateStatus("URISHINGIZ SHART!", true); return;
            }
            selected = {r, c}; updateStatus("Sizning navbatingiz"); render();
        } else if (selected) {
            const moves = getLegalMoves(selected.r, selected.c);
            const move = moves.find(m => m.tr === r && m.tc === c);
            if (move) {
                executeMove(selected.r, selected.c, r, c, move);
                if (currentMode === 'checkers' && move.cap) {
                    const next = getLegalMoves(r, c).filter(m => m.cap);
                    if (next.length > 0) {
                        comboPiece = {r, c}; selected = {r, c};
                        updateStatus("YANA URING!", true); render(); return;
                    }
                }
                comboPiece = null; selected = null; turn = 2; render();
                if(!checkWin()) setTimeout(aiMove, 700);
            }
        }
    }

    function getLegalMoves(r, c) {
        const p = board[r][c];
        let moves = [];
        const dirs = [[1,1], [1,-1], [-1,1], [-1,-1]];

        if (currentMode === 'checkers') {
            dirs.forEach(([dr, dc]) => {
                let nr = r + dr, nc = c + dc;
                if (p.k) { // DAMKA Rossiya qoidasi (Uzoq masofa)
                    let enemy = null;
                    while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        if (!board[nr][nc]) {
                            if (!enemy) { if(!comboPiece) moves.push({tr: nr, tc: nc}); }
                            else { moves.push({tr: nr, tc: nc, cap: enemy}); }
                        } else {
                            if (board[nr][nc].p === p.p || enemy) break;
                            enemy = {r: nr, c: nc};
                        }
                        nr += dr; nc += dc;
                    }
                } else { // Oddiy tosh
                    if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                        if (!board[nr][nc] && !comboPiece) {
                            if (p.p === 1 && dr < 0) moves.push({tr: nr, tc: nc});
                            if (p.p === 2 && dr > 0) moves.push({tr: nr, tc: nc});
                        } else if (board[nr][nc] && board[nr][nc].p !== p.p) {
                            let ur = nr + dr, uc = nc + dc;
                            if (ur >= 0 && ur < 8 && uc >= 0 && uc < 8 && !board[ur][uc]) moves.push({tr: ur, tc: uc, cap: {r: nr, c: nc}});
                        }
                    }
                }
            });
        } else if (currentMode === 'chess') {
            for(let tr=0; tr<8; tr++) for(let tc=0; tc<8; tc++) if(isChessValid(r,c,tr,tc)) moves.push({tr, tc});
        }
        const caps = moves.filter(m => m.cap);
        return caps.length > 0 ? caps : (comboPiece ? [] : moves);
    }

    function isChessValid(fr, fc, tr, tc) {
        const p = board[fr][fc]; if (!p || (board[tr][tc] && board[tr][tc].p === p.p)) return false;
        const dr = tr-fr, dc = tc-fc, adr = Math.abs(dr), adc = Math.abs(dc);
        if (p.type === 'p') {
            const s = p.p === 1 ? -1 : 1;
            if (dc === 0 && !board[tr][tc]) return dr === s || (dr === 2*s && (fr === 1 || fr === 6));
            return adc === 1 && dr === s && board[tr][tc];
        }
        if (p.type === 'r') return (fr === tr || fc === tc) && isPathClear(fr,fc,tr,tc);
        if (p.type === 'n') return (adr === 2 && adc === 1) || (adr === 1 && adc === 2);
        if (p.type === 'b') return adr === adc && isPathClear(fr,fc,tr,tc);
        if (p.type === 'q') return (adr === adc || fr === tr || fc === tc) && isPathClear(fr,fc,tr,tc);
        if (p.type === 'k') return adr <= 1 && adc <= 1;
        return false;
    }

    function isPathClear(fr, fc, tr, tc) {
        const dr = Math.sign(tr-fr), dc = Math.sign(tc-fc);
        let r = fr + dr, c = fc + dc;
        while (r !== tr || c !== tc) { if (board[r][c]) return false; r += dr; c += dc; }
        return true;
    }

    function executeMove(fr, fc, tr, tc, move) {
        board[tr][tc] = board[fr][fc];
        board[fr][fc] = null;
        if (move.cap) board[move.cap.r][move.cap.c] = null;
        if (currentMode === 'checkers' && (tr === 0 || tr === 7)) board[tr][tc].k = true;
    }

    function aiMove() {
        let all = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c]?.p === 2) {
            getLegalMoves(r, c).forEach(m => all.push({fr:r, fc:c, ...m}));
        }
        if (all.length > 0) {
            all.sort((a,b) => (b.cap ? 1 : 0) - (a.cap ? 1 : 0));
            const m = all[0];
            executeMove(m.fr, m.fc, m.tr, m.tc, m);
            if (currentMode === 'checkers' && m.cap && getLegalMoves(m.tr, m.tc).filter(x => x.cap).length > 0) {
                setTimeout(aiMove, 600); return;
            }
        }
        turn = 1; updateStatus("Sizning navbatingiz"); render(); checkWin();
    }

    function getAllCaptures(p) {
        let res = [];
        for(let r=0; r<8; r++) for(let c=0; c<8; c++) if(board[r][c]?.p === p) res.push(...getLegalMoves(r, c).filter(m => m.cap));
        return res;
    }

    function checkWin() {
        let p1=0, p2=0, k1=0, k2=0;
        board.flat().forEach(x => { 
            if(x?.p===1) { p1++; if(x.type==='k') k1++; } 
            if(x?.p===2) { p2++; if(x.type==='k') k2++; } 
        });
        if (currentMode === 'chess') {
            if(k2 === 0 && p2 > 0) { updateStatus("TABRIKLAYMIZ! SIZ YUTDINGIZ! 🎉"); turn=0; return true; }
            if(k1 === 0 && p1 > 0) { updateStatus("BOT YUTDI! 🤖"); turn=0; return true; }
        } else {
            if(p2 === 0) { updateStatus("TABRIKLAYMIZ! SIZ YUTDINGIZ! 🎉"); turn=0; return true; }
            if(p1 === 0) { updateStatus("BOT YUTDI! 🤖"); turn=0; return true; }
        }
        return false;
    }

    function handleXOMove(i) {
        if (board[i] || turn !== 1) return;
        board[i] = 'X'; turn = 2; render();
        if(!checkXOWin()) setTimeout(() => {
            let e = board.map((v,idx) => v === null ? idx : null).filter(v => v !== null);
            if (e.length > 0) board[e[Math.floor(Math.random()*e.length)]] = 'O';
            turn = 1; render(); checkXOWin();
        }, 500);
    }

    function checkXOWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for(let w of wins) if(board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]) {
            updateStatus(board[w[0]] === 'X' ? "TABRIKLAYMIZ! SIZ YUTDINGIZ! 🎉" : "BOT YUTDI! 🤖"); turn = 0; return true;
        }
        if (!board.includes(null)) { updateStatus("DURANG!"); return true; }
        return false;
    }
</script>
</body>
</html>
